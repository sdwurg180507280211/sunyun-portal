services:
  sunyun-portal:
    build:
      context: .
    image: sunyun-portal:latest
    container_name: sunyun-portal
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 8080
      SUNYUN_ADMIN_TOKEN: ${SUNYUN_ADMIN_TOKEN:-replace-with-a-strong-token}
    ports:
      - "${SUNYUN_PORT:-8080}:8080"
    volumes:
      - ./data:/app/data
