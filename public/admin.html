<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>榫合云科技 | 软件项目线索后台</title>
    <link rel="stylesheet" href="/styles.css?v=0.4.0" />
    <link rel="stylesheet" href="/admin.css?v=0.4.0" />
  </head>
  <body class="admin-body">
    <main class="admin-shell">
      <section class="admin-header">
        <div>
          <a class="back-link" href="/">返回门户</a>
          <h1>软件项目线索台账</h1>
          <p>读取官网表单写入的本地线索数据，用于跟进开发需求、筛选项目类型、导出 CSV 并迁移到后续 CRM。</p>
        </div>
        <div class="admin-actions">
          <input id="tokenInput" type="password" placeholder="后台访问口令" autocomplete="current-password" />
          <button class="button primary" id="loadLeadsButton">加载线索</button>
          <button class="button secondary" id="exportButton" disabled>导出 CSV</button>
        </div>
      </section>

      <section class="lead-stats" aria-label="线索统计">
        <div>
          <strong id="leadCount">0</strong>
          <span>总线索</span>
        </div>
        <div>
          <strong id="developmentCount">0</strong>
          <span>开发项目</span>
        </div>
        <div>
          <strong id="consultingCount">0</strong>
          <span>咨询/支持</span>
        </div>
      </section>

      <section class="admin-toolbar">
        <input id="searchInput" type="text" placeholder="搜索公司、联系人、电话、项目类型或需求" disabled />
        <select id="serviceFilter" disabled>
          <option value="">全部项目类型</option>
          <option value="软件定制开发">软件定制开发</option>
          <option value="业务后台/内部工具">业务后台/内部工具</option>
          <option value="官网/小程序/落地页">官网/小程序/落地页</option>
          <option value="数据看板与报表">数据看板与报表</option>
          <option value="IT 咨询与工具选型">IT 咨询与工具选型</option>
          <option value="活动数字化支持">活动数字化支持</option>
        </select>
      </section>

      <section class="lead-table-wrap">
        <table class="lead-table">
          <thead>
            <tr>
              <th>编号</th>
              <th>时间</th>
              <th>项目类型</th>
              <th>客户</th>
              <th>联系人</th>
              <th>电话</th>
              <th>城市</th>
              <th>需求</th>
            </tr>
          </thead>
          <tbody id="leadTableBody">
            <tr>
              <td colspan="8" class="empty-cell">请输入口令后加载线索。</td>
            </tr>
          </tbody>
        </table>
      </section>
    </main>

    <script src="/admin.js?v=0.4.0" type="module"></script>
  </body>
</html>
