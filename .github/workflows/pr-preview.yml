name: PR Preview Cleanup

on:
  pull_request:
    types: [synchronize, closed]

concurrency:
  group: sunyun-preview-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  cleanup:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: self-hosted
    steps:
      - name: Remove isolated preview resources
        shell: bash
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          preview_root="/opt/sunyun-portal/previews/pr-${PR_NUMBER}"
          docker rm -f "sunyun-preview-pr-${PR_NUMBER}" 2>/dev/null || true
          docker rm -f "sunyun-preview-tunnel-pr-${PR_NUMBER}" 2>/dev/null || true
          docker image rm "sunyun-portal:preview-pr-${PR_NUMBER}" 2>/dev/null || true
          rm -rf "$preview_root"
          echo "PR preview resources removed."
