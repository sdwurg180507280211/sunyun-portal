# 部署到阿里云 ECS（GitHub 自托管 Runner）
# 触发：push 到 main，或手动 workflow_dispatch
# 前提（ECS 一次性准备，见 docs/ECS_SETUP.md）：
#   1. ECS 已装 Docker + compose 插件
#   2. 已注册 self-hosted runner（以 deployer 用户运行）
#   3. /opt/sunyun-portal/.env 已存在，含 SUNYUN_ADMIN_TOKEN 与 SUNYUN_PORT
# 特点：runner 主动连 GitHub 拉代码，无需 GitHub 远程 SSH 进服务器，22 端口可长期对 0.0.0.0/0 关闭。

name: Deploy to Aliyun ECS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy with Docker Compose
        run: |
          set -euo pipefail
          docker compose --env-file /opt/sunyun-portal/.env down || true
          docker compose --env-file /opt/sunyun-portal/.env up -d --build
          docker image prune -f

      - name: Health check
        run: |
          sleep 3
          curl -fsS http://127.0.0.1:8080/api/health || exit 1
