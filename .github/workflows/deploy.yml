name: Deploy to Aliyun ECS

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: sunyun-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Preserve legacy data before checkout cleanup
        shell: bash
        run: |
          set -euo pipefail
          sudo mkdir -p /opt/sunyun-portal/data /opt/sunyun-portal/backups
          sudo chown -R "$(id -u):$(id -g)" /opt/sunyun-portal
          if [ -f "$GITHUB_WORKSPACE/data/leads.jsonl" ] && [ ! -f /opt/sunyun-portal/data/leads.jsonl ]; then
            cp "$GITHUB_WORKSPACE/data/leads.jsonl" /opt/sunyun-portal/data/leads.jsonl
          fi
          if [ -f /opt/sunyun-portal/data/sunyun.db ]; then
            cp /opt/sunyun-portal/data/sunyun.db "/opt/sunyun-portal/backups/sunyun.db.$(date +%Y%m%d-%H%M%S).bak"
          fi

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Verify deployment configuration
        shell: bash
        run: |
          set -euo pipefail
          test -f /opt/sunyun-portal/.env
          grep -q '^ADMIN_USERNAME=' /opt/sunyun-portal/.env
          grep -q '^ADMIN_PASSWORD_HASH=' /opt/sunyun-portal/.env
          grep -q '^SESSION_SECRET=' /opt/sunyun-portal/.env

      - name: Build image
        shell: bash
        run: |
          set -euo pipefail
          docker compose --env-file /opt/sunyun-portal/.env build

      - name: Deploy
        shell: bash
        run: |
          set -euo pipefail
          docker compose --env-file /opt/sunyun-portal/.env up -d --remove-orphans
          docker image prune -f

      - name: Health check
        shell: bash
        run: |
          set -euo pipefail
          for attempt in $(seq 1 20); do
            if curl -fsS http://127.0.0.1:8080/api/health; then
              exit 0
            fi
            sleep 3
          done
          docker compose --env-file /opt/sunyun-portal/.env logs --tail=200 sunyun-portal
          exit 1
