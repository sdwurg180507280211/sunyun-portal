name: Deploy to Aliyun ECS

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: sunyun-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Preserve production data before checkout cleanup
        shell: bash
        run: |
          set -euo pipefail
          runner_uid="$(id -u)"
          runner_gid="$(id -g)"
          sudo mkdir -p /opt/sunyun-portal/data /opt/sunyun-portal/backups
          sudo chown "$runner_uid:$runner_gid" /opt/sunyun-portal /opt/sunyun-portal/backups

          if [ -f "$GITHUB_WORKSPACE/data/leads.jsonl" ] && [ ! -f /opt/sunyun-portal/data/leads.jsonl ]; then
            sudo cp "$GITHUB_WORKSPACE/data/leads.jsonl" /opt/sunyun-portal/data/leads.jsonl
          fi

          backup_dir="/opt/sunyun-portal/backups/$(date +%Y%m%d-%H%M%S)"
          mkdir -p "$backup_dir"
          shopt -s nullglob
          data_files=(/opt/sunyun-portal/data/sunyun.db*)
          if [ ${#data_files[@]} -gt 0 ]; then
            sudo cp -a "${data_files[@]}" "$backup_dir/"
          fi
          if [ -f /opt/sunyun-portal/data/leads.jsonl ]; then
            sudo cp -a /opt/sunyun-portal/data/leads.jsonl "$backup_dir/"
          fi
          sudo chown -R "$runner_uid:$runner_gid" "$backup_dir"

          # Dockerfile 中的 nextjs 用户固定为 UID/GID 1001；bind mount 会覆盖镜像内目录权限。
          sudo chown -R 1001:1001 /opt/sunyun-portal/data

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Verify deployment configuration
        shell: bash
        run: |
          set -euo pipefail
          env_file=/opt/sunyun-portal/.env
          test -f "$env_file"
          grep -Eq '^ADMIN_USERNAME=.+$' "$env_file"
          grep -Eq '^ADMIN_PASSWORD_HASH=scrypt:.+:.+$' "$env_file"
          grep -Eq '^SESSION_SECRET=.{32,}$' "$env_file"
          docker compose --env-file "$env_file" config --quiet

      - name: Build, deploy, verify, and roll back on failure
        shell: bash
        run: |
          set -euo pipefail
          env_file=/opt/sunyun-portal/.env
          compose=(docker compose --env-file "$env_file")
          had_previous=0

          if docker image inspect sunyun-portal:latest >/dev/null 2>&1; then
            docker tag sunyun-portal:latest sunyun-portal:rollback
            had_previous=1
          fi

          "${compose[@]}" build
          "${compose[@]}" up -d --remove-orphans

          healthy=0
          for attempt in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:8080/api/health; then
              healthy=1
              break
            fi
            sleep 3
          done

          if [ "$healthy" -ne 1 ]; then
            "${compose[@]}" logs --tail=200 sunyun-portal || true
            if [ "$had_previous" -eq 1 ]; then
              echo "New deployment failed; restoring the previous image."
              docker tag sunyun-portal:rollback sunyun-portal:latest
              "${compose[@]}" up -d --force-recreate --no-build sunyun-portal
              for attempt in $(seq 1 20); do
                if curl -fsS http://127.0.0.1:8080/api/health; then
                  echo "Previous image restored successfully."
                  break
                fi
                sleep 3
              done
            fi
            exit 1
          fi

          docker image prune -f
