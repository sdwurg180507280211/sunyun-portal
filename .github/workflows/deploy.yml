name: Deploy to Aliyun ECS

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
  workflow_dispatch:

jobs:
  deploy:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main')
    runs-on: self-hosted
    concurrency:
      group: sunyun-production
      cancel-in-progress: false
    steps:
      - name: Preserve production data before checkout cleanup
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p /opt/sunyun-portal/data /opt/sunyun-portal/backups
          test -w /opt/sunyun-portal/data
          test -w /opt/sunyun-portal/backups

          if [ -f "$GITHUB_WORKSPACE/data/leads.jsonl" ] && [ ! -f /opt/sunyun-portal/data/leads.jsonl ]; then
            cp "$GITHUB_WORKSPACE/data/leads.jsonl" /opt/sunyun-portal/data/leads.jsonl
          fi

          backup_dir="/opt/sunyun-portal/backups/$(date +%Y%m%d-%H%M%S)"
          mkdir -p "$backup_dir"

          # SQLite 一致性备份：优先用运行中的旧容器做在线备份（backup API 在 WAL 下也能得到单一时间点快照）。
          # 仅当没有运行容器（此时库静止、直接复制即一致）或在线备份失败时，才回退到文件复制。
          if [ -f /opt/sunyun-portal/data/sunyun.db ]; then
            if docker ps --filter 'name=^sunyun-portal$' --filter 'status=running' --format '{{.Names}}' | grep -q '^sunyun-portal$'; then
              online_name="sunyun.db.online-$(date +%Y%m%d-%H%M%S).bak"
              if docker exec -e BK="/app/data/$online_name" sunyun-portal \
                   node -e 'const D=require("better-sqlite3");const db=new D("/app/data/sunyun.db",{readonly:true,fileMustExist:true});db.backup(process.env.BK).then(()=>{db.close();process.exit(0)}).catch((e)=>{console.error(e);process.exit(1)})'; then
                mv "/opt/sunyun-portal/data/$online_name" "$backup_dir/sunyun.db"
                echo "SQLite online consistent backup captured."
              else
                echo "WARNING: online backup failed; falling back to file copy."
                rm -f "/opt/sunyun-portal/data/$online_name" 2>/dev/null || true
                cp -a /opt/sunyun-portal/data/sunyun.db "$backup_dir/" 2>/dev/null || true
                shopt -s nullglob
                for wal in /opt/sunyun-portal/data/sunyun.db-wal /opt/sunyun-portal/data/sunyun.db-shm; do
                  cp -a "$wal" "$backup_dir/" 2>/dev/null || true
                done
                shopt -u nullglob
              fi
            else
              # 无运行容器：数据库处于静止状态，直接复制即为一致快照。
              shopt -s nullglob
              for f in /opt/sunyun-portal/data/sunyun.db /opt/sunyun-portal/data/sunyun.db-wal /opt/sunyun-portal/data/sunyun.db-shm; do
                cp -a "$f" "$backup_dir/" 2>/dev/null || true
              done
              shopt -u nullglob
              echo "No running container; copied quiescent database files."
            fi
          fi

          if [ -f /opt/sunyun-portal/data/leads.jsonl ]; then
            cp -a /opt/sunyun-portal/data/leads.jsonl "$backup_dir/"
          fi

      - name: Checkout verified revision
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

      - name: Verify deployment configuration
        shell: bash
        run: |
          set -euo pipefail
          env_file=/opt/sunyun-portal/.env
          test -f "$env_file"
          grep -Eq '^ADMIN_USERNAME=.+$' "$env_file"
          grep -Eq '^ADMIN_PASSWORD_HASH=scrypt:.+:.+$' "$env_file"
          grep -Eq '^SESSION_SECRET=.{32,}$' "$env_file"
          export SUNYUN_RUN_UID="$(id -u)"
          export SUNYUN_RUN_GID="$(id -g)"
          docker compose --env-file "$env_file" config --quiet

      - name: Build, deploy, verify, and roll back on failure
        shell: bash
        run: |
          set -euo pipefail
          env_file=/opt/sunyun-portal/.env
          export SUNYUN_RUN_UID="$(id -u)"
          export SUNYUN_RUN_GID="$(id -g)"
          compose=(docker compose --env-file "$env_file")
          had_previous=0

          restore_previous() {
            if [ "$had_previous" -ne 1 ]; then
              echo "No previous image is available for rollback."
              return 1
            fi
            echo "Restoring the previous image."
            docker tag sunyun-portal:rollback sunyun-portal:latest
            "${compose[@]}" up -d --force-recreate --no-build sunyun-portal
            for attempt in $(seq 1 20); do
              if curl -fsS http://127.0.0.1:8080/api/health; then
                echo "Previous image restored successfully."
                return 0
              fi
              sleep 3
            done
            echo "Previous image could not be verified after rollback."
            return 1
          }

          if docker image inspect sunyun-portal:latest >/dev/null 2>&1; then
            docker tag sunyun-portal:latest sunyun-portal:rollback
            had_previous=1
          fi

          "${compose[@]}" build
          if ! "${compose[@]}" up -d --remove-orphans; then
            "${compose[@]}" logs --tail=200 sunyun-portal || true
            restore_previous || true
            exit 1
          fi

          healthy=0
          for attempt in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:8080/api/health; then
              healthy=1
              break
            fi
            sleep 3
          done

          if [ "$healthy" -ne 1 ]; then
            "${compose[@]}" logs --tail=200 sunyun-portal || true
            restore_previous || true
            exit 1
          fi

          docker image prune -f

  deploy-test:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'develop')
    runs-on: self-hosted
    concurrency:
      group: sunyun-test
      cancel-in-progress: false
    steps:
      - name: Prepare test directories
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p /opt/sunyun-portal-test/data /opt/sunyun-portal-test/backups
          test -w /opt/sunyun-portal-test/data
          test -w /opt/sunyun-portal-test/backups

      - name: Checkout verified revision
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.sha || github.event.workflow_run.head_sha }}

      - name: Verify test deployment configuration
        shell: bash
        run: |
          set -euo pipefail
          env_file=/opt/sunyun-portal-test/.env
          test -f "$env_file"
          grep -Eq '^ADMIN_USERNAME=.+$' "$env_file"
          grep -Eq '^ADMIN_PASSWORD_HASH=scrypt:.+:.+$' "$env_file"
          grep -Eq '^SESSION_SECRET=.{32,}$' "$env_file"
          export SUNYUN_RUN_UID="$(id -u)"
          export SUNYUN_RUN_GID="$(id -g)"
          docker compose -f docker-compose.test.yml --env-file "$env_file" config --quiet

      - name: Build, deploy test, verify, and roll back on failure
        shell: bash
        run: |
          set -euo pipefail
          env_file=/opt/sunyun-portal-test/.env
          export SUNYUN_RUN_UID="$(id -u)"
          export SUNYUN_RUN_GID="$(id -g)"
          compose=(docker compose -f docker-compose.test.yml --env-file "$env_file")
          had_previous=0

          restore_previous() {
            if [ "$had_previous" -ne 1 ]; then
              echo "No previous test image is available for rollback."
              return 1
            fi
            echo "Restoring the previous test image."
            docker tag sunyun-portal-test:rollback sunyun-portal-test:latest
            "${compose[@]}" up -d --force-recreate --no-build sunyun-portal-test
            for attempt in $(seq 1 20); do
              if curl -fsS http://127.0.0.1:8081/api/health; then
                echo "Previous test image restored successfully."
                return 0
              fi
              sleep 3
            done
            echo "Previous test image could not be verified after rollback."
            return 1
          }

          if docker image inspect sunyun-portal-test:latest >/dev/null 2>&1; then
            docker tag sunyun-portal-test:latest sunyun-portal-test:rollback
            had_previous=1
          fi

          "${compose[@]}" build
          if ! "${compose[@]}" up -d --remove-orphans; then
            "${compose[@]}" logs --tail=200 sunyun-portal-test || true
            restore_previous || true
            exit 1
          fi

          healthy=0
          for attempt in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:8081/api/health; then
              healthy=1
              break
            fi
            sleep 3
          done

          if [ "$healthy" -ne 1 ]; then
            "${compose[@]}" logs --tail=200 sunyun-portal-test || true
            restore_previous || true
            exit 1
          fi

          docker image prune -f
