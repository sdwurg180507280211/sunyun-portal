name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci --no-audit --no-fund
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
        env:
          NEXT_PUBLIC_SITE_URL: https://example.com
          NEXT_TELEMETRY_DISABLED: "1"
      - name: Verify standalone SQLite runtime
        shell: bash
        run: |
          set -euo pipefail
          test -f .next/standalone/node_modules/better-sqlite3/build/Release/better_sqlite3.node
          mkdir -p .next/standalone/.next
          cp -R .next/static .next/standalone/.next/static
          cp -R public .next/standalone/public
          PORT=8080 \
          HOSTNAME=127.0.0.1 \
          DATABASE_PATH="$RUNNER_TEMP/sunyun-ci.db" \
          COOKIE_SECURE=0 \
          NEXT_TELEMETRY_DISABLED=1 \
          node .next/standalone/server.js > "$RUNNER_TEMP/sunyun-ci.log" 2>&1 &
          server_pid=$!
          trap 'kill "$server_pid" 2>/dev/null || true' EXIT
          for attempt in $(seq 1 20); do
            if curl -fsS http://127.0.0.1:8080/api/health; then
              exit 0
            fi
            sleep 1
          done
          cat "$RUNNER_TEMP/sunyun-ci.log"
          exit 1
      - name: Capture scenario visual QA
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y fonts-noto-cjk
          mkdir -p visual-qa
          PORT=8081 \
          HOSTNAME=127.0.0.1 \
          DATABASE_PATH="$RUNNER_TEMP/sunyun-visual.db" \
          COOKIE_SECURE=0 \
          NEXT_TELEMETRY_DISABLED=1 \
          node .next/standalone/server.js > "$RUNNER_TEMP/sunyun-visual.log" 2>&1 &
          visual_pid=$!
          trap 'kill "$visual_pid" 2>/dev/null || true' EXIT
          for attempt in $(seq 1 20); do
            if curl -fsS http://127.0.0.1:8081/api/health; then
              break
            fi
            sleep 1
          done
          capture() {
            local name="$1"
            local size="$2"
            google-chrome --headless --no-sandbox --disable-gpu --hide-scrollbars \
              --window-size="$size" \
              --screenshot="visual-qa/$name.png" \
              http://127.0.0.1:8081/#scenarios
          }
          capture 1440x1000 1440,1000
          capture 1280x800 1280,800
          capture 1024x768 1024,768
          capture 768x1024 768,1024
          capture 390x844 390,844
          capture 375x667 375,667
          google-chrome --headless --no-sandbox --disable-gpu --hide-scrollbars \
            --force-prefers-reduced-motion \
            --window-size=1440,1000 \
            --screenshot=visual-qa/1440x1000-reduced-motion.png \
            http://127.0.0.1:8081/#scenarios
          test "$(find visual-qa -name '*.png' | wc -l)" -eq 7
      - name: Upload scenario visual QA
        uses: actions/upload-artifact@v4
        with:
          name: yunyihui-scenario-visual-qa
          path: visual-qa/*.png
          retention-days: 7
      - name: Build production Docker image
        env:
          DOCKER_BUILDKIT: "1"
        run: docker build -t sunyun-portal:ci --build-arg NEXT_PUBLIC_SITE_URL=https://example.com .
