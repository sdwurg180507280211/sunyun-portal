name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci --no-audit --no-fund
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
        env:
          NEXT_PUBLIC_SITE_URL: https://example.com
          NEXT_TELEMETRY_DISABLED: "1"
      - name: Verify standalone consultation workflow and capture visual QA
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends fonts-noto-cjk
          fc-cache -f
          test -f .next/standalone/node_modules/better-sqlite3/build/Release/better_sqlite3.node
          mkdir -p .next/standalone/.next
          cp -R .next/static .next/standalone/.next/static
          cp -R public .next/standalone/public
          rm -f "$RUNNER_TEMP/yunyihui-ci.db" "$RUNNER_TEMP/yunyihui-ci.db-wal" "$RUNNER_TEMP/yunyihui-ci.db-shm" "$RUNNER_TEMP/yunyihui-cookie.txt"
          PORT=8080 \
          HOSTNAME=127.0.0.1 \
          DATABASE_PATH="$RUNNER_TEMP/yunyihui-ci.db" \
          LEGACY_LEADS_PATH="$RUNNER_TEMP/yunyihui-no-legacy.jsonl" \
          ADMIN_USERNAME=admin \
          ADMIN_PASSWORD_HASH='scrypt:00112233445566778899aabbccddeeff:565859c6cb1a6a568a0ccb50adf101c46da690398a3144aaf721d14fccccafb8a6d01330bd7b58408518d2d5fad262a2378104f5966be6fd4c8f9b0dd8192569' \
          SESSION_SECRET=0123456789abcdef0123456789abcdef \
          COOKIE_SECURE=0 \
          NEXT_PUBLIC_SITE_URL=http://127.0.0.1:8080 \
          NEXT_TELEMETRY_DISABLED=1 \
          node .next/standalone/server.js > "$RUNNER_TEMP/yunyihui-ci.log" 2>&1 &
          server_pid=$!
          trap 'kill "$server_pid" 2>/dev/null || true' EXIT

          ready=0
          for attempt in $(seq 1 20); do
            if curl -fsS http://127.0.0.1:8080/api/health > "$RUNNER_TEMP/health.json"; then
              ready=1
              break
            fi
            sleep 1
          done
          if [ "$ready" -ne 1 ]; then
            cat "$RUNNER_TEMP/yunyihui-ci.log"
            exit 1
          fi

          grep -q '"ok":true' "$RUNNER_TEMP/health.json"
          grep -q '"service":"yunyihui-portal"' "$RUNNER_TEMP/health.json"
          curl -fsS http://127.0.0.1:8080/ >/dev/null
          curl -fsS http://127.0.0.1:8080/privacy >/dev/null
          curl -fsS http://127.0.0.1:8080/opengraph-image >/dev/null

          lead_response=$(curl -fsS -H 'content-type: application/json' \
            -d '{"serviceType":"医药业务系统","companyName":"自动化验收示例机构","contactName":"测试联系人","phone":"13800138000","description":"希望梳理客户协同流程并建设可持续迭代的医药业务系统。","source":"homepage-pharma-prism","website":"","consent":true}' \
            http://127.0.0.1:8080/api/leads)
          printf '%s' "$lead_response" | grep -q '"ok":true'
          printf '%s' "$lead_response" | grep -q '"message":"已收到您的咨询"'
          printf '%s' "$lead_response" | grep -q '"id":"SY-'

          login_response=$(curl -fsS -c "$RUNNER_TEMP/yunyihui-cookie.txt" -H 'content-type: application/json' \
            -d '{"username":"admin","password":"A-strong-admin-password-2026"}' \
            http://127.0.0.1:8080/api/admin/session)
          printf '%s' "$login_response" | grep -q '"ok":true'

          leads_response=$(curl -fsS -b "$RUNNER_TEMP/yunyihui-cookie.txt" --get \
            --data-urlencode 'q=自动化验收示例机构' \
            http://127.0.0.1:8080/api/leads)
          printf '%s' "$leads_response" | grep -q '自动化验收示例机构'
          printf '%s' "$leads_response" | grep -q '"total":1'

          chrome_bin=$(command -v google-chrome || command -v google-chrome-stable || true)
          test -n "$chrome_bin"
          mkdir -p "$RUNNER_TEMP/yunyihui-visual-qa"
          for viewport in 1440,1000 1280,800 1024,768 768,1024 390,844 375,667; do
            filename=${viewport/,/x}
            "$chrome_bin" --headless=new --no-sandbox --disable-gpu --hide-scrollbars \
              --run-all-compositor-stages-before-draw --virtual-time-budget=2500 \
              --window-size="$viewport" --screenshot="$RUNNER_TEMP/yunyihui-visual-qa/${filename}-hero.png" \
              http://127.0.0.1:8080/
          done
          "$chrome_bin" --headless=new --no-sandbox --disable-gpu --hide-scrollbars \
            --run-all-compositor-stages-before-draw --virtual-time-budget=2500 \
            --window-size=1440,1000 --screenshot="$RUNNER_TEMP/yunyihui-visual-qa/1440x1000-delivery.png" \
            'http://127.0.0.1:8080/#delivery'
          "$chrome_bin" --headless=new --no-sandbox --disable-gpu --hide-scrollbars \
            --run-all-compositor-stages-before-draw --virtual-time-budget=2500 \
            --window-size=1440,1000 --screenshot="$RUNNER_TEMP/yunyihui-visual-qa/1440x1000-contact.png" \
            'http://127.0.0.1:8080/#contact'
          "$chrome_bin" --headless=new --no-sandbox --disable-gpu --hide-scrollbars \
            --run-all-compositor-stages-before-draw --virtual-time-budget=2500 \
            --window-size=390,844 --screenshot="$RUNNER_TEMP/yunyihui-visual-qa/390x844-contact.png" \
            'http://127.0.0.1:8080/#contact'
          "$chrome_bin" --headless=new --no-sandbox --disable-gpu --hide-scrollbars \
            --force-prefers-reduced-motion --run-all-compositor-stages-before-draw --virtual-time-budget=2500 \
            --window-size=390,844 --screenshot="$RUNNER_TEMP/yunyihui-visual-qa/390x844-reduced-motion.png" \
            http://127.0.0.1:8080/
      - name: Upload visual QA screenshots
        uses: actions/upload-artifact@v4
        with:
          name: yunyihui-visual-qa
          path: ${{ runner.temp }}/yunyihui-visual-qa/*.png
          if-no-files-found: error
          retention-days: 7
      - name: Build production Docker image
        env:
          DOCKER_BUILDKIT: "1"
        run: docker build -t sunyun-portal:ci --build-arg NEXT_PUBLIC_SITE_URL=https://example.com .
