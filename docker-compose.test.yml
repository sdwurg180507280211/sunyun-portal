services:
  sunyun-portal-test:
    build:
      context: .
      args:
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-http://localhost:8081}
    image: sunyun-portal-test:latest
    container_name: sunyun-portal-test
    restart: unless-stopped
    user: "${SUNYUN_RUN_UID:-1001}:${SUNYUN_RUN_GID:-1001}"
    environment:
      NODE_ENV: production
      PORT: 8080
      HOSTNAME: 0.0.0.0
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-http://localhost:8081}
      DATABASE_PATH: /app/data/sunyun.db
      LEGACY_LEADS_PATH: /app/data/leads.jsonl
      ADMIN_USERNAME: ${ADMIN_USERNAME:?ADMIN_USERNAME is required}
      ADMIN_PASSWORD_HASH: ${ADMIN_PASSWORD_HASH:?ADMIN_PASSWORD_HASH is required}
      SESSION_SECRET: ${SESSION_SECRET:?SESSION_SECRET is required}
      SESSION_TTL_SECONDS: ${SESSION_TTL_SECONDS:-28800}
      # 测试环境通常无 HTTPS，默认关闭 Secure Cookie。
      COOKIE_SECURE: ${COOKIE_SECURE:-0}
      TRUST_PROXY: "1"
      SUNYUN_ADMIN_TOKEN: ${SUNYUN_ADMIN_TOKEN:-}
    ports:
      - "127.0.0.1:${SUNYUN_PORT:-8081}:8080"
    volumes:
      - ${SUNYUN_DATA_DIR:-/opt/sunyun-portal-test/data}:/app/data
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:8080/api/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
